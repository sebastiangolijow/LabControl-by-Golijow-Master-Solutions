services:
  # PostgreSQL database with production settings
  db:
    image: postgres:15-alpine
    container_name: labcontrol_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups/postgres:/backups  # For manual backups
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - labcontrol_network
    # Don't expose port externally in production
    expose:
      - "5432"

  # Redis for caching and Celery broker
  redis:
    image: redis:7-alpine
    container_name: labcontrol_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - labcontrol_network
    expose:
      - "6379"

  # Django web application with Gunicorn
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labcontrol_web
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 60 --access-logfile - --error-logfile -
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - labcontrol_network
    healthcheck:
      # The slim Python image has no curl/wget. Use http.client (stdlib) to
      # hit the /health/ endpoint, which is exempt from SSL redirect (see
      # config/settings/prod.py SECURE_REDIRECT_EXEMPT).
      test:
        - CMD-SHELL
        - >-
          python -c "import http.client,sys;
          c=http.client.HTTPConnection('localhost',8000,timeout=5);
          c.request('GET','/health/');
          sys.exit(0 if c.getresponse().status==200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: labcontrol_nginx
    restart: unless-stopped
    ports:
      - "8443:443"  # External 8443 -> Internal 443 (Traefik uses 80/443)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro  # Let's Encrypt certificates
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./frontend/dist:/usr/share/nginx/html:ro  # Vue.js production build
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - web
    networks:
      - labcontrol_network
    healthcheck:
      # nginx default server name is `_` which makes wget's URL parser fail
      # ("bad address '_'"). Use nc to verify the SSL port is listening — if
      # nginx accepts a TCP connect on 443 it's serving requests.
      test: ["CMD-SHELL", "nc -z localhost 443 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery worker for background tasks
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labcontrol_celery_worker
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=2
    volumes:
      - media_volume:/app/media
      - /srv/labwin_backups:/srv/labwin_backups  # LabWin DB backup pipeline (Phase B)
    env_file:
      - .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - labcontrol_network
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Firebird 2.5 container — restored target for nightly LabWin backups
  # See LABWIN_BACKUP_PIPELINE.md for the full ingestion flow.
  # Not exposed to host; only reachable on labcontrol_network as "firebird:3050".
  #
  # NOTE: Firebird 2.5 silently truncates SYSDBA passwords to 8 chars.
  # Keep FIREBIRD_SYSDBA_PASSWORD ≤ 8 chars or accept the truncation behavior.
  firebird:
    image: jacobalberty/firebird:2.5-ss
    container_name: labcontrol_firebird
    restart: unless-stopped
    env_file:
      - .env.production       # Provides ISC_PASSWORD (= LABWIN_FDB_PASSWORD)
    environment:
      - FIREBIRD_DATABASE=BASEDAT.FDB
    volumes:
      - firebird_data:/firebird/data
      - /srv/labwin_backups:/backups:ro  # read-only — celery_worker manages writes
    networks:
      - labcontrol_network
    expose:
      - "3050"

  # Celery beat for scheduled tasks
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labcontrol_celery_beat
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - labcontrol_network
    healthcheck:
      # celery beat has no HTTP server. PID 1 in this container is the beat
      # process (run as `python /home/appuser/.local/bin/celery -A config beat ...`),
      # so verify PID 1's cmdline still contains "beat". `pidof celery` doesn't
      # work because the executable name is `python3.11` — celery is just argv[1].
      test:
        - CMD-SHELL
        - tr '\0' ' ' < /proc/1/cmdline | grep -q beat || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    name: labcontrol_postgres_data
  redis_data:
    name: labcontrol_redis_data
  static_volume:
    name: labcontrol_static
  media_volume:
    name: labcontrol_media
  firebird_data:
    name: labcontrol_firebird_data

networks:
  labcontrol_network:
    name: labcontrol_network
    driver: bridge
